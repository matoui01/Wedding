<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true">
  <!-- Authentic marks from the locked design chart (mezzomonte acquerello v3). -->
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9c7a3e"/><stop offset=".5" stop-color="#d8bd7e"/><stop offset="1" stop-color="#a8863f"/></linearGradient>

    <symbol id="crest" viewBox="0 0 220 240">
      <ellipse cx="110" cy="120" rx="78" ry="94" fill="none" stroke="url(#goldGrad)" stroke-width="1.6"/>
      <ellipse cx="110" cy="120" rx="72" ry="88" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.7"/>
      <path d="M86 36 Q110 16 134 36" stroke="url(#goldGrad)" stroke-width="1.4" fill="none"/><circle cx="110" cy="22" r="3" fill="url(#goldGrad)"/>
      <path d="M70 206 Q110 226 150 206" stroke="url(#goldGrad)" stroke-width="1.2" fill="none"/>
      <path d="M30 120 q8 -22 20 -10 q-14 4 -8 20 q-10 -2 -12 -10" fill="url(#goldGrad)" opacity="0.85"/>
      <path d="M190 120 q-8 -22 -20 -10 q14 4 8 20 q10 -2 12 -10" fill="url(#goldGrad)" opacity="0.85"/>
      <text x="110" y="138" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-weight="600" font-size="74" fill="url(#goldGrad)">I</text>
      <text x="110" y="172" text-anchor="middle" font-family="'Pinyon Script',cursive" font-size="30" fill="#c47a54">&amp;</text>
      <text x="110" y="200" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-weight="600" font-size="44" fill="url(#goldGrad)">M</text>
      <text x="110" y="226" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8.5" letter-spacing="3" fill="url(#goldGrad)">MMXXVII</text>
    </symbol>

    <symbol id="corner" viewBox="0 0 90 90">
      <g fill="none" stroke="url(#goldGrad)" stroke-width="1.1" stroke-linecap="round">
        <path d="M10 10 L10 56"/><path d="M10 10 L56 10"/>
        <path d="M10 56 q0 -30 30 -34 q-22 10 -18 30 q14 -8 26 2"/>
        <path d="M56 10 q-30 0 -34 30 q10 -22 30 -18 q-8 14 2 26"/>
        <circle cx="14" cy="14" r="2.4" fill="url(#goldGrad)" stroke="none"/>
        <path d="M22 22 q12 0 18 8 M22 22 q0 12 8 18" opacity="0.8"/>
      </g>
    </symbol>

    <symbol id="seal" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="50" fill="#9aab8e"/><circle cx="60" cy="60" r="50" fill="#8a9c7c" opacity="0.5"/>
      <circle cx="60" cy="60" r="41" fill="none" stroke="#f5f1e6" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 3"/>
      <text x="60" y="74" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-weight="600" font-size="34" fill="#f3eee1">I&amp;M</text>
    </symbol>

    <symbol id="sprig" viewBox="0 0 40 40"><g fill="none" stroke="currentColor" stroke-width="1.1"><path d="M20 34 Q20 18 20 8"/><path d="M20 26 Q12 22 8 14 M20 26 Q28 22 32 14"/><path d="M20 18 Q13 15 10 9 M20 18 Q27 15 30 9"/></g></symbol>
